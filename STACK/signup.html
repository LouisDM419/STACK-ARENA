<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | STAR StackArena</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-banner {
            display: none;
            background-color: rgba(255, 60, 60, 0.15);
            color: #ff4d4d;
            border: 1px solid rgba(255, 60, 60, 0.4);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 500;
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        .error-banner.fade-out {
            opacity: 0;
        }
    </style>
</head>

<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card" style="max-width: 650px;">
            <div class="auth-header">
                <a href="index.html" class="logo"><img src="assets/star-logo.svg" class="star-logo" alt="STAR"> <span class="logo-sub">| StackArena</span></a>
                <h2 style="color:#fff; font-size:2rem; margin-top:15px; text-transform:uppercase;">Create Account</h2>
                <p>Register below to secure your identity and play ranked matches.</p>
            </div>

            <div id="error-message" class="error-banner"></div>

            <form id="signup-form">
                <!-- User Identifiers -->
                <div class="input-group">
                    <label>Full Name <span
                            style="color:var(--text-muted); font-size:0.8rem; font-weight:normal; margin-left:5px;">(Private
                            Account Identity)</span></label>
                    <input type="text" id="fullname" placeholder="Enter your legal first and last name">
                </div>

                <div style="display:flex; gap:20px; flex-wrap:wrap;">
                    <div class="input-group" style="flex:2; min-width:200px;">
                        <label>Username <span
                                style="color:var(--text-muted); font-size:0.8rem; font-weight:normal; margin-left:5px;">(Public
                                Display)</span></label>
                        <div style="position:relative;">
                            <span
                                style="position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--accent-orange); font-weight:bold;">@</span>
                            <input type="text" id="username" placeholder="player_one" style="padding-left:40px;">
                        </div>
                    </div>
                    <div class="input-group" style="flex:1; min-width:150px;">
                        <label>Gender</label>
                        <select id="gender"
                            style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 15px; border-radius: 8px; outline: none; font-family: var(--font-body); height: 48px;">
                            <option value="" disabled selected>Select...</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Prefer not to say</option>
                        </select>
                    </div>
                </div>

                <!-- Contact & Security -->
                <div class="input-group">
                    <label>Email Address <span
                            style="color:var(--text-muted); font-size:0.8rem; font-weight:normal; margin-left:5px;">(Used
                            for OTP verification & recovery)</span></label>
                    <input type="email" id="email" placeholder="name@example.com">
                </div>

                <div style="display:flex; gap:20px; flex-wrap:wrap;">
                    <div class="input-group mb-1" style="flex:1; min-width:200px;">
                        <label>Password</label>
                        <div style="position:relative;">
                            <input type="password" id="password" placeholder="Create a strong password">
                        </div>
                    </div>
                    <div class="input-group mb-1" style="flex:1; min-width:200px;">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="Repeat your password">
                    </div>
                </div>

                <!-- Terms -->
                <div class="checkbox-group mt-4"
                    style="display:flex; align-items:flex-start; gap:15px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px;">
                    <input type="checkbox" id="terms"
                        style="width:24px; height:24px; accent-color:var(--accent-orange); margin-top:2px;">
                    <label for="terms" style="font-size:0.9rem; color:#cfd6e6; margin:0; line-height:1.5;">
                        I agree to the <a href="terms.html"
                            style="color:var(--accent-orange); text-decoration:underline;">Terms of Service</a> and <a
                            href="privacy.html" style="color:var(--accent-orange); text-decoration:underline;">Privacy
                            Policy</a>, and I acknowledge the platform rules regarding match disputes, fair play, and
                        fiat payouts.
                    </label>
                </div>

                <button type="button" class="btn btn-primary full-width mt-4"
                    style="padding:15px; font-size:1.15rem; background: linear-gradient(90deg, #F96D00, #ff9800); border:none;"
                    onclick="triggerVerification()">Create Account <i class="fas fa-chevron-right ms-2"></i></button>
            </form>

            <div class="auth-footer mt-4 text-center">
                <p style="color:var(--text-muted); font-size:1.05rem;">Already have an account? <a href="login.html"
                        style="color:var(--accent-gold);">Log In</a></p>
            </div>
        </div>
    </div>

    <!-- OTP Modal Overlay -->
    <div class="create-match-modal" id="otp-modal" style="display:none; z-index:9999;">
        <div class="cm-modal-content text-center" style="max-width: 400px; padding: 40px 30px;">
            <i class="fas fa-envelope-open-text mb-3" style="font-size: 3.5rem; color: var(--accent-orange);"></i>
            <h3 style="color:#fff; font-size: 1.8rem; margin-bottom:10px;">Verify Your Email</h3>
            <p style="color:var(--text-muted); font-size: 0.95rem; margin-bottom:20px;">We've sent a 4-digit setup code
                to <strong style="color:#fff;" id="verify-email-display">your email</strong>. Enter it below to activate
                your account.</p>

            <div class="otp-inputs">
                <input type="text" maxlength="1" onkeyup="moveToNext(this, 'otp2')" id="otp1">
                <input type="text" maxlength="1" onkeyup="moveToNext(this, 'otp3')" id="otp2">
                <input type="text" maxlength="1" onkeyup="moveToNext(this, 'otp4')" id="otp3">
                <input type="text" maxlength="1" id="otp4">
            </div>

            <button class="btn btn-primary full-width mt-4" id="btn-verify" onclick="completeSignup()"
                style="padding: 15px; font-size:1.1rem; font-weight:bold;">Verify & Continue</button>
            <p style="margin-top: 20px; font-size:0.9rem; color:var(--text-muted);">Didn't receive code? <a href="#"
                    style="color:var(--accent-orange); text-decoration:underline;">Resend Code</a></p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        function showError(msg) {
            const errorBox = document.getElementById('error-message');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            errorBox.classList.remove('fade-out');

            if (window.errorTimeout) clearTimeout(window.errorTimeout);
            if (window.fadeTimeout) clearTimeout(window.fadeTimeout);

            window.errorTimeout = setTimeout(() => {
                errorBox.classList.add('fade-out');
                window.fadeTimeout = setTimeout(() => {
                    errorBox.style.display = 'none';
                }, 500);
            }, 3000);
        }

        function triggerVerification() {
            // Basic validation
            const fullname = document.getElementById('fullname').value.trim();
            const username = document.getElementById('username').value.trim();
            const gender = document.getElementById('gender').value;
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const cpass = document.getElementById('confirm-password').value;
            const terms = document.getElementById('terms').checked;

            if (!fullname || !username || !gender || !email || !pass || !cpass) {
                showError("Please fill in all fields to proceed.");
                return;
            }
            if (!terms) {
                showError("You must agree to the Terms of Service to continue.");
                return;
            }
            if (pass !== cpass) {
                showError("Passwords do not match!");
                return;
            }

            document.getElementById('verify-email-display').innerText = email;
            document.getElementById('otp-modal').style.display = 'flex';
            document.getElementById('otp-modal').classList.add('active');
            document.getElementById('otp1').focus();
        }

        function moveToNext(current, nextFieldID) {
            if (current.value.length >= current.maxLength) {
                document.getElementById(nextFieldID).focus();
            }
        }

        async function completeSignup() {
            const btn = document.getElementById('btn-verify');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = 'Activating Account... <i class="fas fa-spinner fa-spin ms-2"></i>';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const gamerTag = document.getElementById('username').value.trim();

            try {
                const result = await api.registerUser(email, pass, gamerTag);
                console.log("Signup successful", result);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error("Signup failed", err);
                alert("Verification failed: " + (err.message || "User already exists or invalid data."));
                btn.innerHTML = originalBtnHtml;
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
