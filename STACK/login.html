<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | STAR StackArena</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-banner {
            display: none;
            background-color: rgba(255, 60, 60, 0.15);
            color: #ff4d4d;
            border: 1px solid rgba(255, 60, 60, 0.4);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 500;
            transition: opacity 0.5s ease;
            opacity: 1;
        }
        .error-banner.fade-out {
            opacity: 0;
        }
    </style>
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo"><img src="assets/star-logo.svg" class="star-logo" alt="STAR"> <span class="logo-sub">| StackArena</span></a>
                <h2 style="color:#fff; font-size:2rem; margin-top:15px; text-transform:uppercase;">Welcome Back</h2>
                <p>Sign in with your credentials to access the arena.</p>
            </div>
            
            <div id="error-message" class="error-banner"></div>

            <form id="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <div style="position:relative;">
                        <i class="fas fa-envelope"
                            style="position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
                        <input type="email" id="login-email" placeholder="name@example.com" style="padding-left:45px;">
                    </div>
                </div>

                <div class="input-group mb-1">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <label style="margin:0;">Password</label>
                        <a href="#" style="font-size:0.85rem; color:var(--accent-gold); text-decoration:none;">Forgot
                            Password?</a>
                    </div>
                    <div style="position:relative;">
                        <i class="fas fa-lock"
                            style="position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
                        <input type="password" id="login-password" placeholder="Enter your password"
                            style="padding-left:45px; padding-right:45px;">
                        <i class="fas fa-eye" id="toggle-pass"
                            style="position:absolute; right:15px; top:50%; transform:translateY(-50%); color:var(--text-muted); cursor:pointer;"
                            onclick="togglePassword()"></i>
                    </div>
                </div>

                <button type="button" class="btn btn-primary full-width mt-4" style="padding:15px; font-size:1.1rem;"
                    onclick="processLogin()">Log In <i class="fas fa-arrow-right ms-2"></i></button>
            </form>

            <div class="auth-footer mt-4 text-center">
                <p style="color:var(--text-muted);">Don't have an account? <a href="signup.html"
                        style="color:var(--accent-orange);">Create Account</a></p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('login-password');
            const icon = document.getElementById('toggle-pass');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-message');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            errorBox.classList.remove('fade-out');
            
            if (window.errorTimeout) clearTimeout(window.errorTimeout);
            if (window.fadeTimeout) clearTimeout(window.fadeTimeout);
            
            window.errorTimeout = setTimeout(() => {
                errorBox.classList.add('fade-out');
                window.fadeTimeout = setTimeout(() => {
                    errorBox.style.display = 'none';
                }, 500);
            }, 3000);
        }

        async function processLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value;
            
            if (!email || !pass) {
                showError("Please enter both your email address and password.");
                return;
            }

            const btn = document.querySelector('button.btn-primary');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = 'Connecting... <i class="fas fa-spinner fa-spin ms-2"></i>';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            try {
                const result = await api.loginUser(email, pass);
                console.log("Login successful", result);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error("Login failed", err);
                showError(err.message || "Invalid credentials or server error. Please try again.");
                btn.innerHTML = originalBtnHtml;
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
