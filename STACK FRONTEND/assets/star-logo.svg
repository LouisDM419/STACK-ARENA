<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA85C" />
      <stop offset="40%" stop-color="#F96D00" />
      <stop offset="100%" stop-color="#993D00" />
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E66500" />
      <stop offset="100%" stop-color="#803300" />
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#0055FF" />
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2D3A" />
      <stop offset="100%" stop-color="#0B0D14" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Blue Neon Backlight -->
  <path d="M100 20 L160 50 L140 100 L100 140 L60 100 L40 50 Z" fill="url(#blueGlow)" filter="url(#strongGlow)" opacity="0.6"/>

  <!-- Dark Wings / Shield Base -->
  <path d="M100 15 L180 45 L150 90 L180 110 L100 150 L20 110 L50 90 L20 45 Z" fill="url(#wingGrad)" stroke="#111" stroke-width="2"/>

  <!-- Neon Blue Accents in Wings -->
  <path d="M40 55 L70 65 L40 75 Z" fill="#00D2FF" filter="url(#glow)"/>
  <path d="M160 55 L130 65 L160 75 Z" fill="#00D2FF" filter="url(#glow)"/>
  <path d="M60 115 L80 105 L70 120 Z" fill="#00D2FF" filter="url(#glow)"/>
  <path d="M140 115 L120 105 L130 120 Z" fill="#00D2FF" filter="url(#glow)"/>

  <!-- Gold Outer Trim (Chevron cuts) - Now Orange -->
  <path d="M100 10 L175 42 L145 80 L165 95 L100 140 L35 95 L55 80 L25 42 Z" fill="none" stroke="url(#goldDark)" stroke-width="6"/>

  <!-- Floating Star Base (slightly darker orange) -->
  <polygon points="100,25 120,70 170,75 130,105 140,155 100,125 60,155 70,105 30,75 80,70" fill="url(#goldDark)"/>

  <!-- Inner Bright Star -->
  <polygon points="100,30 115,72 160,76 125,102 135,145 100,120 65,145 75,102 40,76 85,72" fill="url(#goldGrad)"/>

  <!-- Star Highlights (3D facet effect) - Now Orange hued -->
  <polygon points="100,30 115,72 100,100" fill="#FFC285" opacity="0.8"/>
  <polygon points="100,100 115,72 160,76" fill="#F96D00" opacity="0.6"/>
  <polygon points="100,100 160,76 125,102" fill="#E65C00" opacity="0.5"/>
  <polygon points="100,120 100,100 125,102 135,145" fill="#CC5200" opacity="0.7"/>
  <polygon points="100,120 65,145 75,102 100,100" fill="#FF8533" opacity="0.4"/>
  <polygon points="100,100 75,102 40,76" fill="#FFC285" opacity="0.6"/>
  <polygon points="100,30 100,100 85,72" fill="#FFA85C" opacity="0.9"/>
  
  <!-- Tiny sparkles -->
  <circle cx="100" cy="100" r="4" fill="#FFF" filter="url(#glow)"/>
  <circle cx="100" cy="30" r="2" fill="#FFF" filter="url(#glow)"/>
  <circle cx="160" cy="76" r="2" fill="#FFF" filter="url(#glow)"/>
  <circle cx="40" cy="76" r="2" fill="#FFF" filter="url(#glow)"/>
  <circle cx="135" cy="145" r="2" fill="#FFF" filter="url(#glow)"/>
  <circle cx="65" cy="145" r="2" fill="#FFF" filter="url(#glow)"/>
</svg>
